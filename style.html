<script>
  // Show loader - only if element exists
  function showLoader() {
    var loader = document.getElementById("loader");
    if (loader) {
      loader.style.display = "block";
    }
  }

  // Hide loader - only if element exists
  function hideLoader() {
    var loader = document.getElementById("loader");
    if (loader) {
      loader.style.display = "none";
    }
  }

  // Populate select - only if element exists
  function populateSelect(selectId, data) {
    var select = document.getElementById(selectId);
    if (!select) return; // Exit if element doesn't exist
    
    select.innerHTML = '<option value="">اختر...</option>';
    if (data && Array.isArray(data)) {
      data.forEach(function(item) {
        select.innerHTML += '<option value="' + item[0] + '">' + item[0] + '</option>';
      });
    }
  }

  // Populate hotels based on city - only if elements exist
  function populateHotels(city) {
    var hotelSelect = document.getElementById("hotel");
    if (!hotelSelect) return; // Exit if element doesn't exist
    
    showLoader();
    google.script.run.withSuccessHandler(function(hotels) {
      populateSelect("hotel", hotels.map(function(hotelName) { return [hotelName]; }));
      hideLoader();
    }).withFailureHandler(function(error) {
      Swal.fire('Error', error.message, 'error');
      hideLoader();
    }).getHotelsByCity(city);
  }

  // Event Listeners - Only run if necessary elements exist
  document.addEventListener("DOMContentLoaded", function() {
    // Check if we're on a page that needs these initializations
    var supplierSelect = document.getElementById("supplier");
    var clientNameSelect = document.getElementById("client_name");
    var citySelect = document.getElementById("city");
    var saveBookingBtn = document.getElementById("saveBooking");
    
    // Only run initialization if the required elements exist
    if (supplierSelect && clientNameSelect && citySelect) {
      showLoader();
      google.script.run.withSuccessHandler(function(data) {
        populateSelect("supplier", data);
        google.script.run.withSuccessHandler(function(data) {
          populateSelect("client_name", data);
          google.script.run.withSuccessHandler(function(data) {
            populateSelect("city", data);
            hideLoader();
          }).getCity();
        }).getClients();
      }).getSuppliers();
    }

    // City change listener - only if city element exists
    if (citySelect) {
      $(citySelect).change(function() {
        var selectedCity = $(this).val();
        if (selectedCity) {
          populateHotels(selectedCity);
        } else {
          populateSelect("hotel", []);
        }
      });
    }

    // Date change listener for nights calculation - only if elements exist
    var checkInInput = document.getElementById("check_in");
    var checkOutInput = document.getElementById("check_out");
    var nightsInput = document.getElementById("nights");
    
    if (checkInInput && checkOutInput && nightsInput) {
      $("#check_in, #check_out").change(function() {
        var checkIn = new Date($("#check_in").val());
        var checkOut = new Date($("#check_out").val());
        if (checkIn && checkOut && checkOut > checkIn) {
          var diffTime = Math.abs(checkOut - checkIn);
          var diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          $("#nights").val(diffDays);
        } else {
          $("#nights").val(0);
        }
      });
    }

    // Save booking button - only if element exists
    if (saveBookingBtn) {
      $("#saveBooking").click(function() {
        var bookingDetails = {
          supplier: $("#supplier").val(),
          supplierName: $("#supplier_name").val(),
          supplierType: $("#supplier_type").val(),
          supplierRef: $("#ref_supp").val(),
          clientName: $("#client_name").val(),
          clientPhone: $("#client_phone").val(),
          clientNationality: $("#nationality").val(),
          adults: $("#adults").val(),
          children: $("#children").val(),
          city: $("#city").val(),
          hotel: $("#hotel").val(),
          hotelRef: $("#ref_hotel").val(),
          roomType: $("#room_type").val(),
          mealPlan: $("#meal_plan").val(),
          checkIn: $("#check_in").val(),
          checkOut: $("#check_out").val(),
          nights: $("#nights").val(),
          notes: $("#notes").val()
        };
        
        if (!bookingDetails.clientName || !bookingDetails.hotel || !bookingDetails.checkIn) {
          Swal.fire('خطأ', 'الرجاء ملء الحقول الأساسية (العميل، الفندق، تاريخ الوصول)', 'warning');
          return;
        }

        Swal.fire({
          title: 'إرسال تأكيد عبر الإيميل',
          html:
            '<p>الحجز سيتم حفظه. هل تريد إرسال إيميل تأكيد؟</p>' +
            '<select id="swal-email" class="form-select">' +
              '<option value="">-- عدم الإرسال --</option>' +
              '<option value="info@hotel-example.com">إيميل المورد 1</option>' +
              '<option value="manager@hotel-example.com">إيميل المورد 2</option>' +
              '<option value="accounts@your-tourism-company.com">قسم الحسابات</option>' +
            '</select>' +
            '<textarea id="swal-notes" class="form-control mt-2" placeholder="ملاحظات إضافية (ستظهر في نص الإيميل)..."></textarea>',
            
          showCancelButton: true,
          confirmButtonText: 'حفظ وإرسال',
          cancelButtonText: 'إلغاء',
          showLoaderOnConfirm: true,
          
          preConfirm: () => {
            var email = document.getElementById('swal-email').value;
            var notes = document.getElementById('swal-notes').value;
            
            showLoader();

            return google.script.run
              .withSuccessHandler(function(response) {
                hideLoader();
                Swal.fire('تم!', response, 'success');
                
                if(document.getElementById("bookingForm")) {
                  document.getElementById("bookingForm").reset();
                }
                populateSelect("hotel", []);
              })
              .withFailureHandler(function(error) {
                hideLoader();
                Swal.fire('خطأ!', error.message, 'error');
              })
              .addNewBooking(bookingDetails, email, notes);
          },
          allowOutsideClick: () => !Swal.isLoading()
        });
      });
    }
  });
</script>
