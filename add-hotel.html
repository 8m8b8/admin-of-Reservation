  <script>
    (function () {
      const navBar = document.getElementById('ghada-nav-bar');
      if (!navBar) {
        return;
      }
      const rawBaseUrl = '<?= headerAppUrl ?>';
      const baseUrl = rawBaseUrl && rawBaseUrl !== 'undefined'
        ? rawBaseUrl
        : (function () {
            try {
              return window.top.location.href.split('?')[0];
            } catch (error) {
              return '';
            }
          })();
      const currentPage = document.body.dataset.page || 'index';
      
      // الصفحات العادية (لا تحتاج كلمة مرور للوصول إليها)
      const publicPages = ['index', 'Add-client', 'add-tour', 'add-hotel', 'manage-reservations', 'edit-reservation'];
      // الصفحات المحمية (تحتاج كلمة مرور)
      const protectedPages = ['SUPPLIER', 'manage-statistics', 'mediator', 'payments'];
      // كلمة المرور
      const PASSWORD = 'admin966';
      // مفتاح التخزين للجلسة
      const AUTH_KEY = 'ghada_admin_auth';
      
      function isAuthenticated() {
        try { return sessionStorage.getItem(AUTH_KEY) === 'true'; } catch (e) { return false; }
      }
      
      function setAuthenticated(value) {
        try { if (value) { sessionStorage.setItem(AUTH_KEY, 'true'); } else { sessionStorage.removeItem(AUTH_KEY); } } catch (e) {}
      }
      
      function isCurrentPagePublic() { return publicPages.includes(currentPage); }
      function isTargetPageProtected(targetPage) { return protectedPages.includes(targetPage); }
      
      function showPasswordPrompt(targetUrl) {
        Swal.fire({
          title: 'صفحة محمية',
          text: 'أدخل كلمة المرور للوصول إلى هذه الصفحة',
          input: 'password',
          inputPlaceholder: 'كلمة المرور',
          showCancelButton: true,
          confirmButtonText: 'دخول',
          cancelButtonText: 'إلغاء',
          confirmButtonColor: '#008891',
          inputAttributes: { autocapitalize: 'off', autocorrect: 'off' },
          preConfirm: (password) => {
            if (password === PASSWORD) { return true; }
            else { Swal.showValidationMessage('كلمة المرور غير صحيحة'); return false; }
          }
        }).then((result) => {
          if (result.isConfirmed) { setAuthenticated(true); window.top.location.href = targetUrl; }
        });
      }
      
      navBar.querySelectorAll('.ghada-nav-item').forEach((button) => {
        const targetPage = button.dataset.page;
        if (targetPage === currentPage) {
          button.classList.add('active');
          button.setAttribute('aria-current', 'page');
        }
        button.addEventListener('click', (event) => {
          if (!targetPage || !baseUrl || targetPage === currentPage) { return; }
          const targetUrl = targetPage === 'index' ? baseUrl : `${baseUrl}?page=${targetPage}`;
          if (isTargetPageProtected(targetPage) && isCurrentPagePublic() && !isAuthenticated()) {
            event.preventDefault();
            showPasswordPrompt(targetUrl);
            return;
          }
          window.top.location.href = targetUrl;
        });
      });
    })();
  </script>

  <script>
    const hotelForm = document.getElementById('hotelForm');
    const hotelCitySelect = document.getElementById('hotelCity');
    const submitBtn = document.getElementById('hotelSubmitBtn');
    const spinner = submitBtn.querySelector('.spinner-border');
    const submitText = submitBtn.querySelector('.default-text');

    document.addEventListener('DOMContentLoaded', () => {
      // loadCities(); // تم إيقاف جلب المدن من السيرفر للاعتماد على القائمة الثابتة في HTML

      hotelForm.addEventListener('submit', function (event) {
        event.preventDefault();
        const formData = new FormData(hotelForm);
        const payload = {
          name: (formData.get('name') || '').trim(),
          city: formData.get('city') || '',
          category: formData.get('category') || '',
          contact: (formData.get('contact') || '').trim(),
          phone: (formData.get('phone') || '').trim(),
          email: (formData.get('email') || '').trim(),
          notes: (formData.get('notes') || '').trim()
        };

        if (!payload.name || !payload.city) {
          Swal.fire({
            title: 'تنبيه',
            text: 'اسم الفندق والمدينة حقول إلزامية.',
            icon: 'warning',
            confirmButtonText: 'حسناً'
          });
          return;
        }

        toggleHotelLoading(true);

        google.script.run
          .withSuccessHandler(() => {
            Swal.fire({
              title: 'تم الحفظ',
              text: 'تمت إضافة الفندق بنجاح.',
              icon: 'success',
              timer: 1500,
              showConfirmButton: false
            });
            hotelForm.reset();
            toggleHotelLoading(false);
          })
          .withFailureHandler((error) => {
            console.error(error);
            Swal.fire({
              title: 'خطأ',
              text: 'تعذر حفظ بيانات الفندق. الرجاء المحاولة لاحقاً.',
              icon: 'error',
              confirmButtonText: 'حسناً'
            });
            toggleHotelLoading(false);
          })
          .addHotel(payload);
      });
    });

  function loadCities() {
    google.script.run
      .withSuccessHandler(function (data) {
        const cities = normalizeCityList(data && data.cities);
        populateSelect(hotelCitySelect, cities, 'اختر المدينة');
      })
      .withFailureHandler(function (error) {
        console.error(error);
        Swal.fire({
          title: 'تنبيه',
          text: 'تعذر تحميل قائمة المدن. يرجى تحديث الصفحة.',
          icon: 'error',
          confirmButtonText: 'حسناً'
        });
      })
      .getHotelFormLookups();
  }

  function populateSelect(selectElement, items, placeholder) {
    const fragment = document.createDocumentFragment();
    const placeholderOption = document.createElement('option');
    placeholderOption.value = '';
    placeholderOption.textContent = placeholder;
    placeholderOption.disabled = true;
    placeholderOption.selected = true;
    fragment.appendChild(placeholderOption);

    items.forEach(item => {
      if (!item) return;
      const option = document.createElement('option');
      option.value = item;
      option.textContent = item;
      fragment.appendChild(option);
    });

    selectElement.innerHTML = '';
    selectElement.appendChild(fragment);
  }

  function normalizeCityList(list) {
    if (!Array.isArray(list)) {
      return [];
    }
    return list
      .map(item => Array.isArray(item) ? item[0] : item)
      .filter(Boolean);
  }

    function toggleHotelLoading(isLoading) {
      submitBtn.disabled = isLoading;
      spinner.classList.toggle('d-none', !isLoading);
      submitText.classList.toggle('d-none', isLoading);
    }
  </script>
